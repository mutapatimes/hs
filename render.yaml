# Render Blueprint for the Halia embedded Shopify app.
# Deploy: push to GitHub, then in Render → New → Blueprint → pick this repo.
# Secrets marked `sync: false` are set in the Render dashboard (not committed).
services:
  - type: web
    name: halia
    runtime: docker      # Docker (not native Python) so WeasyPrint's cairo/pango libs are present
    dockerfilePath: ./Dockerfile
    plan: free            # cold starts + 30-day Postgres expiry on free; upgrade for production
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: halia-db
          property: connectionString
      - key: SHOPIFY_API_KEY          # from the HALIA Dev Dashboard app
        sync: false
      - key: SHOPIFY_API_SECRET       # from the HALIA Dev Dashboard app
        sync: false
      - key: SHOPIFY_API_VERSION
        value: "2026-04"
      - key: HALIA_APP_URL            # public site + email link base; add this as a Custom Domain
        value: "https://haliascore.com"   # on the Render service (Settings → Custom Domains) too
      - key: HALIA_ENCRYPTION_KEY     # Fernet key to encrypt stored secrets at rest — set once,
        sync: false                   # generate with: python -c "from cryptography.fernet import Fernet;print(Fernet.generate_key().decode())"
      - key: HALIA_CACHE_TTL          # seconds to keep scored customers in RAM (zero-retention)
        value: "300"
      # Stripe billing. Set BOTH SECRET_KEY and PRICE_ID to switch the freemium gate ON: a newly
      # connected tenant then sees the teaser (hidden-VIC count + latent value) until they subscribe.
      # Leave unset to keep every dashboard fully open.
      - key: STRIPE_SECRET_KEY        # sk_live_… (or sk_test_… while testing)
        sync: false
      - key: STRIPE_PRICE_ID          # price_… of your recurring subscription price
        sync: false
      - key: STRIPE_WEBHOOK_SECRET    # whsec_… from the Stripe webhook endpoint (/webhooks/stripe)
        sync: false
      - key: HALIA_FREE_SHOPS         # comma-separated tenant keys to comp (e.g. your first client)
        sync: false
      - key: HALIA_CONSOLE_KEY          # password for /console, the cross-tenant console dashboard
        sync: false
      - key: HALIA_ADMIN_KEY            # password for /admin, the content (CMS) editor. Use the SAME
        sync: false                     # value as HALIA_CONSOLE_KEY for one shared sign-in across both.
      # Brevo transactional email — powers magic-link sign-in, order alerts, and the
      # "your VICs are ready" email. Without the API key these degrade silently (no email).
      - key: HALIA_BREVO_API_KEY        # xkeysib-… from Brevo → SMTP & API → API Keys
        sync: false
      - key: HALIA_CHAT_WIDGET_ID       # Brevo Conversations widget ID (Conversations → Settings →
        value: "6a43cc31455a9d0f0f0ba759"   # Chat widget). Public-facing, not a secret — it ships
                                            # in page source. Unset = no chat bubble.
      - key: HALIA_EMAIL_FROM           # must be a VERIFIED sender in Brevo (Senders)
        value: "haliasearch@gmail.com"
      - key: HALIA_EMAIL_FROM_NAME
        value: "Halia"
      # Halia's own Brevo contact lists — demo leads and new clients are auto-added so the
      # demo-nurture and client-welcome AUTOMATIONS fire. IDs from Brevo → Contacts → Lists.
      - key: HALIA_BREVO_LIST_DEMO
        value: "3"
      - key: HALIA_BREVO_LIST_CLIENTS
        value: "4"
      - key: HALIA_CRON_KEY            # shared secret the cron job below uses to POST the scheduler
        sync: false

  # Fires the lifecycle-email scheduler hourly (demo nurture, client welcome, weekly nudges).
  # Runs a tiny stdlib POST to /internal/cron/run with the X-Cron-Key header. No extra deps.
  - type: cron
    name: halia-journeys
    runtime: python
    plan: free
    schedule: "0 * * * *"
    buildCommand: "echo no build needed"
    startCommand: >-
      python -c "import os,urllib.request as u;
      r=u.Request(os.environ['HALIA_APP_URL'].rstrip('/')+'/internal/cron/run',method='POST',
      headers={'X-Cron-Key':os.environ['HALIA_CRON_KEY']});print(u.urlopen(r,timeout=60).read())"
    envVars:
      - key: HALIA_APP_URL
        value: "https://haliascore.com"
      - key: HALIA_CRON_KEY
        sync: false

databases:
  - name: halia-db
    plan: free
